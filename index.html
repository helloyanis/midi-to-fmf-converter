<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI to FMF</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>MIDI to FMF</h1>

      <section>
        <label>
          MIDI file
          <input id="midiFile" type="file" accept=".mid,.midi,audio/midi" />
        </label>
      </section>

      <section>
        <label>
          Track
          <select id="trackSelect" disabled>
            <option value="">Load a MIDI file first</option>
          </select>
        </label>
      </section>

      <section>
        <button id="playPauseButton" type="button" disabled>Play</button>
        <button id="stopButton" type="button" disabled>Stop</button>
        <label>
          Seek
          <input id="seekSlider" type="range" min="0" max="0" value="0" step="0.001" disabled />
        </label>
        <span id="timeLabel">0:00 / 0:00</span>
      </section>

      <section>
        <label>
          Simultaneous notes
          <select id="polyMode">
            <option value="highest" selected>Keep highest</option>
            <option value="lowest">Keep lowest</option>
            <option value="both">Keep both (may break song)</option>
          </select>
        </label>
        <button id="convertButton" type="button" disabled>Convert selected track to FMF</button>
        <progress id="progressBar" hidden></progress>
        <div id="status"></div>
      </section>
      <p>I'm open source! <a href="https://github.com/helloyanis/midi-to-fmf-converter">Check out the source code</a>. Made with 🧡 by <a href="https://🦊💻.ws?utm_source=midi2fmf&utm_medium=referral">helloyanis</a></p>
    </main>

    <script src="main.js" type="module"></script>
  </body>
</html>
